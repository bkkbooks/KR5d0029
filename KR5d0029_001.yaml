body:
  text: 席上腐談卷上元俞琰撰邵康節曰動物自首生植物自根生自首生命在首自根生命在根又曰飛者棲木食木鷹鸇之毛猶木也走者棲草食草虎豹之毛猶草也飛之𩔖喜風而敏於飛上走之𩔖喜土而利於走下在水者不瞑在風在地者瞑走之𩔖上睫接下飛之𩔖下睫接上𩔖使之然也水𩔖出水即死風𩔖入水即死然有出入之𩔖者龜蟹鵞鳬之𩔖是也牛順物乗順風而行則順馬健物遡逆風而行則健書費誓云馬牛其風春秋左氏𫝊云風馬牛不相及蓋馬牛奔則各自從風而行也北地馬羣每一牡將十餘牝而行牝皆隨牡而不入他羣焉易之坤卦云利牝馬之貞蓋謂此也今人稱婦人為媽媽亦是此意蟻亦不入他羣故呼為馬蟻一名𤣥駒瑣碎録云魚逆水而上鳥向風而立取其鱗羽之順也有微風不知所從來但觀鳥之所向虱隂物其足六北方坎水之數也行必北首騐之果然嚮見一書云耳今忘其書之名周禮山虞仲冬斬陽木仲夏斬隂木在山南者為陽在山北者為隂仲冬日南至仲夏日北至皆日光之所及也是故木之面南者在水則面向上肝属木當浮而反沈肺属金當沈而反浮何也肝實而肺虛也石入水則沈而南海有浮石之山木入水則浮而南海有沈水之烏木虛實之相反也爾雅云鳥之雌雄不可别者以翼左掩右為雄右掩左為雌張華博物志亦載此說陶𨼆君曰鳥之雌雄難别舊云其翼左覆右是雄又燒毛納水中沈者是雄浮者是雌魏伯陽參同契云男生而伏女偃一作仰其軀非徒生時著而見之及其死也亦復效之本在交媾定制始先禇氏遺書云陽氣聚面故男子面重溺死必伏隂氣聚背故女子背重溺死必仰走獸溺死伏仰皆然素問云升降出入無器不有注云壁窻户牖兩面伺之皆承來氣衝擊于人是則出入氣也以物投井及穽中翩翩不疾皆升氣所礙也虛管溉滿捻上懸之水固不泄為無升氣而不能降也空瓶小口頓溉不入為氣不出而不能入也故曰升降出入器無不有予幼時有道人見教為劇燒片紙納空瓶急覆于銀盆水中水皆湧入瓶而銀盆鏗然有聲蓋火氣使之然也又依法放于壮夫腹上挈之不墜即如銅水滴捻其竅則水不滴放之則滴修養家存神于泥丸則丹田之氣上升蓋神之所至氣亦隨之而住也房中術所謂手按尾閭吸氣嚥津雖得其緒餘而亦不泄欲知時辰隂陽常别以鼻鼻中氣陽時在左隂時在右亥子之交兩鼻俱通丹家謂玉洞雙開是也馬痛死者不可食食之殺人而肝為甚醫書云馬火畜也有肝而無膽木臟不足故食其肝者死史記云秦繆公亡馬野人得而食之者三百餘人吏欲法之繆公曰君子不以畜産害人吾聞食馬肉者不飲酒傷人乃皆賜酒而赦之予近見里人葛恒齋食馬肉腫傷以煮酒入鹽飲之而愈然則酒誠可以解馬毒也左氏傳云國狗之瘈無不噬也杜預注云瘈狂也宋書云張收嘗為猘犬所傷食蝦蟇膾而愈猘居例反亦作征列切狂犬也或謂杏仁亦可以治犬傷内則云狼去腸狸去瘠去尻狐去首豚去腦魚去乙鱉去醜鄭氏云皆為不利人也左氏𫝊云晉侯夢楚子伏已而盬其腦子犯曰吉吾且柔之矣杜預注云腦所以柔物今人熟皮必用猪腦欲其柔也昔有人食猪腦一具朞年手足軟弱不能下榻遂成癱瘓乃知内則與左傳之說皆不誣矣魚去乙鄭氏注云魚體中害人者東海鰫魚有骨名乙在目傍狀如蒙乙食之鯁人不可出爾雅云魚枕謂之丁魚腸謂之乙魚尾謂之丙予謂鄭𤣥謂乙為魚骨爾雅則以為魚腸皆以其為如書乙字也若以狼去腸推之則魚之乙非腸矣乃魚骨也唐詩云杜宇呼名語巴江學字流蓋以江勢曲折如巴字或謂蛙形象蚯蚓形象之此皆魚骨象乙之意也陸龜蒙謂鴨能言能自呼其名或謂自呼其名者鴨鵲猫狗亦皆能之豈特鴨與杜宇燐火俗謂之鬼火兵死及牛馬之血曰燐螢火亦曰燐其明皆如火而非火也吾家舊有老僕素不信鬼隨先人徃無錫青陽匯收租夜見鬼火無數騰騰而來衆驚走獨老僕乗醉趍前撲之乃石楠葉之濕者予嘗夜坐水亭雨初霽見草間有光遂起而拾之乃一濕蝦殻葉玉岩云嚮在五臺山中夜間見濕松皮有光呼從者拾滿一布囊蓋將持歸遺江南親戚故舊以示希有數日後視之則乾而無光矣笑而棄之古享禮猶今前筵古宴禮猶今後筵杜預曰享有禮貌設几不倚爵盈而不飲肴乾而不食宴則折俎相與共食古之素積即今之細摺布衫也荀子云皮弁素積楊倞注云素積為裳用十五升布為之蹙其腰中故謂之素積一升八十縷十五升千二百縷葢細布也玉藻云士不衣織鄭氏注云織染絲織之釋文云織音志今訛為注遂稱織絲為注絲志注聲相近也或寫為苧絲則又轉訛矣北方毛段細軟者曰子氄子謂毛之細者氄温柔貌書堯典云鳥獸氄毛是也今訛為紫茸豳詩云無衣無褐何以卒嵗鄭氏云褐毛布也貴者無衣賤者無褐何以卒嵗愚按孟子云視刺萬乗之君若刺褐夫以褐夫對萬乗之君亦言貴賤之殊耳褐乃編枲粗短衣不黄不皂賤者之服非毛布也褐字從衣毼字從毛鄭氏誤以褐為毼遂云褐毛布也毛布乃今之斜毼價貴于苧麻多矣此豈賤者之服今之蒙衫即古之毳衣蒙謂毛之細軟貌如詩所云狐裘䝉茸之蒙俗作氁其實即是毛衫毛訛為蒙蒙又轉而為氁氊之異名曰毛席毯之異名曰毛褥猶竹笠呼為竹巾東漢西域𫝊注氈曰毛席張衡四愁詩云美人贈我氈氍服䖍通俗又云織毛褥謂氍細者謂之毾㲪毾㲪者施大牀之前小蹋牀之上蹋而登牀者漆器有所謂犀皮者出西毘國訛而為犀皮桂漿者出罽漿國訛為桂漿以此推之氍恐即是渠拽國名音同而字不同耳西毘亦即是織皮國名訛而為西毘也渠拽織皮出書禹貢幞頭起于周武帝以幅巾裹首故曰幞頭幞字音伏與幞被之幞同今訛為僕韓退之元和聖徳詩云以紅帕首蓋以紅綃縛其頭即今之抹額也帕首幞頭本只是一物今分為二物唐人幞頭初以皂紗為之後以其軟遂折桐木山子在前襯起名曰舉容頭以為起于魚朝恩五代相承用之至宋乃易以藤織者仍易以紗後又易以漆紗周武所製不過如今之結巾就垂兩角初無帶唐人添四帶以兩角垂前兩角垂後宋又横兩角以鐵線張之庻免朝見之時偶語近時凉緇巾以竹絲為骨如涼㡌之狀而覆以皂紗易脱易戴夏月最便以此見幞頭之製亦是展轉翻騰故其様古今不同如此嚮見官妓舞柘枝戴一紅物體長而頭尖儼如靴形想即是今之罟姑也𤨏碎録云柘枝舞本後魏拓拔之名易拓為柘易拔為枝琵琶又名鼙婆唐詩琶字皆作入聲音弼王昭君琶琵懐肆胡人重造而其形小昭君笑曰渾不似今訛為胡撥四觱栗二字豳詩說文觱作畢朱晦菴曰篳篥元名悲栗言其聲悲壮也悲觱畢三聲皆相張衡四愁詩云美人贈我金錯刀古之錯即今之磋也磋千箇反北人讀錯作去聲南人讀錯作入聲其實一也鬚眉荀子作須麋楊倞注云麋與眉同髭鬚亦作兹疏荀子云龍兹劉向列女𫝊云龍疏火席名也楊倞云兹與髭同一作鬚龍兹即龍疏疏鬚聲相近也郊特牲云筦簟之安而蒲越藁鞂之尚左氏傳云大路越席越户括反今錢塘市肆所賣蒲合即越也以越為合聲之訛耳柫水車柫也楊倞以為連枷枷乃打稻器非柫也古之承霤以木為之用行水即今之承落也崔豹古今注云長安御溝謂之楊溝謂植髙楊于其上也又曰羊溝謂羊喜觝觸墻垣為溝以隔之故曰羊溝愚謂今人以水溝在庭内不可見者為陰溝在庭外可見者曰陽溝吳人指積薪曰柴積音祭即周禮天官委積之積鄭氏云委積謂牢米薪芻釋文云積子賜反今訛為祭以委積停留曰祭留禮記云天無二日孟子亦云天無二日乃若春秋左氏𫝊云天有十日蓋謂十幹甲至癸也列子乃云堯時十日並出荘子淮南子又從而附益其說雖寓言不亦過乎或者曰亦有兩日並出而相鬭者載之信史不可謂無也予曰不然唐乾符六年十一月兩日並出而鬭此必日初出時水中映日蕩揺上下不定遂成兩日之相摩天安得有兩日二十八宿有房日兔畢月烏丹書云日烏月兔蓋謂日月之交也易以離為日陽中有隂也坎為月陰中有陽也張横渠謂陰陽之精互藏其宅是也兔四足漢張衡以為隂𩔖其數偶烏有三跡陽之𩔖其数竒愚謂兔自屬日所謂月中兔者月中之日光也丹家借此以喻神入氣中猶日光照入月内乃着兔于月以為法象故其說有云者月者藥也世俗遂謂月中有搗藥兔妄矣今于數百步之外觀山上行人如白蟻之小及過數十里外山亦不見何況地去天數萬里之髙逺安能見月中之兔哉月中果有可見則不知此兔何等様之大小也張衡謂羿請無死之藥于西王母羿妻姮娥竊之以奔月中是謂蟾蜍劉昭盛稱張衡天文之妙而張衡論姮娥與蟾蜍如此得非承前人之謬乎晉志云羲和占日常儀占月區車占星儀音蛾今謂月中女名嫦娥因又名日月為羲娥謬之甚矣謂月中嫦娥者妄也又謂有廣寒清虚之府則又妄之又妄矣月中有蟾兔桂𣗳之說皆妄也然戰國時已有是說矣楚辭云夜光何徳死則又育厥利維何而顧菟在腹朱晦菴云菟與兎同世俗桂𣗳蟾光之𫝊其惑久矣或者以為日月在天如兩鏡相照而地居其中故日月㣲黒處乃鏡中大地之影略有形似而非直有是物也斯言有理足破千古之惑宋蒼梧王使楊玉夫伺織女渡河曰見當報我不見當殺汝遂為玉夫所弑織女乃經星萬古不移豈有渡河之時蓋丹家運夾脊之氣上升崑崙頂中謂之黄河逆流又以任督二脉為天河因以牛女喻身中之陰陽交媾爾杜子美天河詩乃有牛女年年渡何曽風浪生之句張文潜七夕歌形容織女一宵之歡以為猶勝嫦娥不嫁人夜夜孤眠廣寒殿大扺騷人才士嘲風詠月不過一時之嬉耳寧復揆之以理織女星名也安有機杼之具武后七夕得金梭于庭乃宮人為之耳猶真宗之得天書天有書乎乃王欽若之徒為之耳黄河出于地上崑崙山東流至于磧石故夏禹導河至磧石而始天河自在天上隨天運轉晝夜不定豈得與黄河相接李大白乃云黄河之水天上來太白蓋以崑崙山為天上也天河與海霄壤髙下之不同豈乗槎可到張華博物志乗槎入天河見牽牛織女星可見其誕也列子謂女媧氏煉五色石以補天儒者譏其誕天未嘗有缺縱有缺豈煉石可補況天體運轉不停從何而措手譏之誠是也殊不知五色石以喻五臟之氣耳養生之法潜神内視則五臟之氣聚于丹田自丹田熏蒸達于腦中腦為崑崙居上象天補天即黄庭經所謂填腦所謂子欲不死修崑崙是也江東采石世俗相𫝊女媧補天煉五色石于此故名采石以訛𫝊訛女媧氏伏羲氏之王天下後世以女媧為古聖女乃伏羲之妹顓頊之母豈其然乎且夫氏名女媧猶國名女直又如左氏傳所謂女艾荘子所謂偊女髙孟子所謂馮婦果皆婦人哉書云皇天后土皇者大也后即厚也古字后厚通用也楊州后土夫人祠塑后土為婦人像謬矣月令云其神后土注云顓帝之子孫祭法云共工氏之霸九州也其子曰后土能平九州故祀以為社左氏傳云共工氏有子曰句龍為后土此豈婦人哉古者天子稱元后諸侯則為羣后若以后土為婦人則后䕫后稷亦可為婦人乎朱晦菴曰如今祀天地山川神塑貌像以祭極無義理愚按西漢郊祀志天地合祭位皆南嚮同席共牢髙帝髙后配於壇上西嚮亦同席共牢蓋取乾父坤母之義此時未有塑像不敢設位爾乃若山川之神與天地神祇本皆無形今塑東嶽神為帝者像又塑后夫人像以為之妻妾則不知其娶何氏為妻買何氏為妾也郡有土地廟曰城隍廟以其在郡城之下也古者鑿土以築城而城下之地無水曰隍有水曰池易曰城復于隍謂泰之上六極則必反逆倒轉為否之初六亦猶城圯而其土復填于隍也蓋有城則有隍縣無城而稱其土地廟為城隍廟何耶吕氏春秋云魯哀公問于孔子曰䕫之一足信之乎孔子對曰調六律和八音惟一人則足矣愚謂哀公所問蓋以䕫為獨脚鬼也或稱軒轅有四目唐堯有八眉道聽途說之不實街談巷語之失真皆此𩔖也東漢曹褒傳云章帝語班固曰堯作大章一足矣此必古有是語與孔子答哀公之意同䕫乃虞舜時典樂教胄子者哀公以為獨脚鬼也寃哉獨脚鬼乃山魈見道家烟蘿子圖連胲一隻脚故唐詩有山鬼趫跳惟一足之句豈可以為鬼物者哉孔叢子曰土石怪䕫罔兩國語云木石之怪䕫蝄蜽未有所謂一足之說荘子乃云䕫之一足其行趻踔注云一足獸如牛無角聲如雷黄帝殺之以皮冒鼓聲聞五百里怪哉東漢西南夷有國乃黄帝時槃瓠之種槃瓠之說甚怪而可笑蓋理之所必無也理之所必無惟可與燭理之明者道庸人孺子不必與之辯也大扺語怪者多託以黄帝時事昧者以為信然識者之所不取也大孤山状如一隻履小孤山状如一瓣香相對有彭浪磯今以小孤山為小姑彭浪為彭郎謂彭郎娶小姑為妻江行者過其廟皆致敬也温州有土地杜拾姨無夫五撮鬚相公無婦州人迎杜拾姨以配五撮鬚合為一廟杜拾姨為誰乃杜拾遺也五撮鬚為誰乃伍子胥也少陵有靈必對子胥笑曰爾尚有相公之稱我乃為拾姨豈不雌我耶近見廉司李裕僉事云江陵北有奉甲站初不曉奉甲為何義詢之父老乃言春申君所居春訛為奉申訛為甲也有自中原來者云北方有牛王廟畫百牛于壁而牛王居其中問牛王為何人乃冉子伯牛嗚呼冉伯牛乃為牛王眞武即𤣥武宋避祖諱改𤣥為真夫𤣥武乃斗牛女虚危室壁七宿位居北方屬水江南人家祀之以厭火灾如漢武帝栢梁殿飾以蚩尾蚩乃海器水之精也水能克火因置此像又如徐州黄樓黄土色土所以勝水也朱晦菴曰真武非是有一箇神人被髮者蓋只是𤣥武所謂青龍朱雀白虎𤣥武亦非是有四箇物以角星為角心星為心尾星為尾是為青龍虚危星如龜螣蛇在虚之下故為𤣥武真宗時諱𤣥字故改為真參星有四脚如虎故為白虎翼星如翼軫星如項下嗉井星如冠故為朱雀盧仝詩頭戴井冠楊子雲言龍虎烏龜正是如此𤣥武即烏龜之異名龜水族也水屬北其色黒故曰𤣥龜有甲能捍禦故曰武其實只是烏龜一物耳北方七宿如龜形其下有螣蛇星蛇火屬也丹家借此以喻身中水火之交遂繪為龜蛇蟠蚪之状世俗不知其故乃以𤣥武為龜蛇二物賈秋壑㑹客食鼈一客不食鼈問之則曰奉祀真武秋壑曰真武之龜不可以為鼈也龜鼈不辨何以治民客乃求郡者也遂不與郡座客同戲之曰鰻與鰍鱓皆不可食象真武之蛇也蔗笋亦不可食象真武之旗竿也滿座皆笑秋壑亦笑韓退之與軒轅彌明石鼎聫句云時於蚯蚓竅鳴作蒼蠅聲後人乃云茶鼎聲號蚓香盤火度螢句雖工然蚯蚓安得有聲蓋不熟玩韓詩耳退之蓋謂鼎中湯鳴如蒼蠅之聲非謂如蚯蚓之聲也蚯蚓竅乃石鼎之竅如蚯蚓藏身于泥中之竅耳崔豹古今注云蚯蚓一名曲蟮善長吟于地下江東人謂之歌女謬矣按月令螻蟈鳴蚯蚓出蓋與螻蟈同處鳴者螻蟈非蚯蚓也吳人呼螻蟈為螻蛄故諺云螻蟈呌得腸㫁曲蟮乃得歌名晦菴曰今以𤣥武為真聖而作真龜蛇于其下已無義理而又天蓬天猷及翊聖作四聖殊無義理醫家謂肝属東方木而藏魂肺属西方金而藏魄道家乃有三魂七魄之說魂果有三魄果有七乎曰非也蓋九宫數以三居左七居右也白玉蟾三龍四虎之説亦猶是蓋太𤣥以三為木四為金也蘇子由云古説左腎其腑膀胱右命門其腑三焦丈夫以藏精女子以繫胞以理推之三焦皆如膀胱有形質可見而王叔和言三焦有名無狀不亦謬乎曾虎臣云按白虎通性情篇謂上焦若竅中焦若編下焦若瀆據此則三焦有形質矣叔和既不察而子由亦偶忘之耶愚謂聞之𨼆者云三焦即黄庭也丹書以心火腎大膀胱火聚于此以猛烹極煅故曰三焦焦乃武火之謂也沈存中亦云黃庭有名而無形與叔和之說同然存中亦不知黄庭即三焦叔和亦不知三焦即黄庭與曽虎臣謂三焦有形亦是已就從白虎通分為上中下則又非也丹書云竒經八脈惟任督二脈為一身隂陽之海五氣貞元此為機㑹任脈起于中極之下以上毛際循腹裏上關元至咽㗋属隂脈之海督脈起于下極之腧並于脊裏上至風府入腦上顛循額至鼻属陽脈之海運尾閭夀五百嵗為白鹿蓋通此督脈者也龜之夀亦然龜能閉息伏氣蓋通此任脈者也又能通此二脈海則貫尾閭通泥丸百脈皆通黄庭經云皆在心内運天經晝夜存之自長生天經即黄道乃日月往來之路在人身為任督二脈乃呼吸往来之路予曩得一子不哭不乳三日而死不知何疾後讀醫書保生方三因方皆因兒生不啼不乳蓋因剪臍帶之時為風所入自臍以上循胷喉攻至下胲齒齦當中作黄粟一粒疼不可忍故不啼不乳但以指甲破之出黄膿一㸃便啼便乳後以此法敎人凡活數兒矣按素問難經甲乙經皆云任脈者起于中極之下以上毛際循腹裏上關元至咽喉又按朱肱内外二景圖云上下齒縫中間齦交二穴乃任督二脈之㑹乃知嬰兒初生所以不啼不乳者風入任脈故也木瀆酒肆吳其姓者病精滑不禁百藥不可療予授以一術極簡易但脅腹縮尾閭閉光瞑目頭若帶石即引氣自背後直入泥丸而後嚥歸丹田不問遍數行往坐卧皆為之仍敎以服既效方保真丸彼亦不服但行此術不半年後見之疾已愈而顔如桃矣此術亦可療頭風道家傍門術有鼻吸口吐之說以為不漏既吐矣安得不漏始不信試之果驗此術亦可療夢遺世傳三峯採戰之術托黄帝𤣥素之名以為容成公彭祖之所以獲髙夀者皆此術士大夫惑之多有以此喪其軀可哀也已葛洪喻之為冰盆盛湯羽苞蓄火或以為舐刀刃之探虎穴之子豈不險哉北夢瑣言載唐相國夏侯孜得彭數之術悦一娼娼不能奉承以致尾閭之泄致卒予外祖閭丘公為大理評事時得此術兩臉如桃年過七十竟為此術所害與夏侯孜無異丹家以為桶底脱蓋中年而精力健能吸縮閉固晚年精力衰不能吸縮閉固是以一夕而傾倒殆盡夷堅志載吳道人害縣吏之妻而卒為縣吏所害道人一死固不足以償數十婦女之命然縣吏亦善此術蓋嘗害他人之妻者其妻㡬為道人所害賴有羊羔湯以補之而不死亦幸矣九華山杜安仁先天大學性命書九篇議論滔滔儘有講明或者曰此書嘗進呈髙廟予觀其進表有云過以相與者必能濟衰合大過卦枯楊生梯之道分明是房中術蓋借易以文其說非清浄無為之道也覆山子谷注隂符經以竒器為未用之處女可謂亂道之甚矣又注參同契穿鑿附㑹是乃魏伯陽之罪人也真西山為之序其書儒者蓋以之為異端而不復窮究其說遂為所欺三谷子金丹百問其三十八問云人之生如何分男女陰陽曰男先感而後女應之者必生男也女先感而男後應之者必生女也男女神和氣順精全即生端正福夀之人若神傷氣憊精虧者即生怪状天薄之人三谷子姓丘名山字安道江右南城人三谷其所居也乾道初遇金華老人得金丹之術遂作此書雲間儲華谷祛疑說云開氣為男闔氣為女一闔一闢男女攸分宜春李玉溪注玉皇心印經云男女禀受同也但感合先後而分隂陽耳褚氏遺書云隂血先至陽精後衝血開裹精精入為骨而男形成矣陽精先入隂血後參精開裹血血入居本而女形成矣施肩吾鍾吕傳道集云父精先進母血後行血包于精而為女母血先進父精後行精包于血而為男肩吾蓋祖褚氏之說與三谷子之說相反不可不辯予三十年前嘗與燕山温次霄總管夜語生男生女之分次霄深取三谷子與儲華谷之說且曰孫思邈天癸一日二日之說不足取至論白玉蟾氣血盈虚似月魂之說則證以素問所謂月始生則血氣始精月郭滿則血氣實月郭空則經絡虚蓋氣血自月上弦至望則盛下弦至晦則衰月郭滿魚腦實月郭空則魚腦減蛤與蟹皆然呂氏春秋與淮南子皆不誣也愚嘗見士大夫之未得子者毎毎以此語之多有得子者然育與不育則有天命存焉非人之所能為也醫書載求男法多引用褚氏遺書之說誤人多矣吾鄉一貴公子連得二女其後妾又懐姙貴公子喜而告予曰今必得男吾用褚氏法也予笑曰若用褚氏法當拱聽足下更弄一瓦他日果又生女予告以丘三谷儲華谷之說越一載遂生一男近㑹澄江郭伯英閒語中原前輩胡紫山温次霄郝吉甫因論褚氏遺書之說伯英憮然曰吾為此書所誤矣伯英蓋亦用褚氏法者也連生六女而弗悟後以語松江張士龍之子可謂以迷指迷矣因告之曰速宜改正之可也伯英曰改正之法當如何予曰陽精先至隂血從而包之陽在内則男形成矣此乾道索坤而成男之謂也隂血先至陽精從而包之隂在内而女形成矣此坤道索乾而成女之謂也伯英聞之笑謝而去或疑貴公子侍妾滿前得子反少漁郎一夫一婦得子反多何也此理曉然有何難見蓋寡欲乃有子多欲則無子譬調一杯羮鹽恰少則有味鹽多則無味也士大夫欲得子法當節欲否則就枯松而索膏瀝槁竹而求汁欲得子也難矣孝經云父母生之續莫大焉未得子者不可不知也然又有一說男猶天也女猶地也天之雨露未嘗不沾濡也而地有肥磽之不同亦有生物者亦有不生物者地若瘦瘠或剛鹵或瓦礫而責其不生物是鐫冰而改大挼藍而求朱徒爾覬望而已無獲也東漢書馬勒傳云勒祖偃長不滿七尺常自罪短陋恐子孫之似也乃為子伉娶長妻伉生勒長八尺三寸世降俗末江南士大夫徃往溺于聲色娶妻買妾皆求其稚齒而嬌嫩者故生子皆軟弱多病而夭亡甚而醉以入房神思昏亂雖得子亦不慧陰陽均至非男非女之身精血散分駢胎品胎之兆此褚氏遺書之說也或有無糞門者無産門者何為其然也徐巽胎育感化論云父母大小便急而受胎也其說出衛生經又有頭如雪而肌純白者或者以為社日受胎故男曰社公女曰社婆非歟曰非也徐巽胎育感化論云受胎之時母之經水正行榮血泛溢是以成胎則肌肉色白褚氏謂血充肌膚則身白是也毛髮皆白目視䀮䀮者何也經云毛髮者血之餘又云肝受血而能視今月水方行血耗肝虚毛髮失所潤目精失所養也席上腐談卷上
