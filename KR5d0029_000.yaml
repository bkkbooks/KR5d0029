body:
  text: 席上腐談道家𩔖提要臣等謹案席上腐談二卷宋俞琰撰是書乃其劄記雜説惟上卷前數十條為考證名物之語詞意多膚淺無稽如謂婦人俗稱媽媽乃取坤卦利牝馬之貞意謂之名因出於渠搜謂㲩之名取於蹋以登牀多附㑹穿鑿不足為據其餘則皆闢容成之術及論褚氏遺書胎孕之説下卷則備述丹書而終以黄白為戒大㫖皆不出道家而在道家之中持論獨為近正亦由其先明儒理故不惑方士之詭説也朱存理樓居雜著有是書䟦語二條其一稱石澗先生注易外别有席上腐談易説皆有刻此編特手筆存於家黄巖林公守郡時持之而去其家别無副本至今吳中失其𫝊庚戌秋與海昌董子壬㑹於逆旅偶談家有是書又已失去遂同過祝秋官處轉為假之歸幸此書又復來吳中云云是此書之𫝊出於存理其一稱俞氏家集云腐談四卷今止二卷今本曰輔談者雖聲相近而字畫轉訛不同必有據也云云考永樂大典所引或作輔或作腐參差不一觀存理䟦知當時本自異文非有兩書矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:bd21fc8379a5704324a8155fb9b359f24e97bf02413a9002c6ec966db33d9027
