body:
  text: 席上腐談巻下元俞琰撰養生之學以老氏為宗老子著書曰道徳經同時有程本乃老子之徒孔子與之傾蓋而語者也其書曰子華子又有文子又有關令尹喜皆老子之弟子文子之書曰通𤣥真經尹子之書曰關尹子其後有列子之書曰沖虚至徳真經莊子之書曰南華真經皆祖老氏之説其經名乃徽廟褒詔所稱老子著甚多漢有河上公魏有王弼唐有葉法善宋有蘓子由王雱近世無錫尤氏老子音訓謂古本王亦大為人亦極有理子華子之書靈樞經内有一段引用其説文子有黙希子注愚觀文子首章云非有道不可言不可言即道與老子道可道非常道之意若合符節關尹子有陳抱一注列子有張湛注莊子有郭象注成𤣥英注近有林鬳齋老列莊三子口義列子引黄帝書曰谷神不死是謂𤣥牝愚謂此語出黄帝書老子所云亦出黄帝書也荘子之書本于列子蓋發明列子之說者也黄帝隂符經黄帝素問邵康節以為獸國時書託黄帝之名而為之也愚謂金碧龍虎經黄庭經恐是魏晉間文章葢托老氏之名而為之也陰符經有李荃注驪山老姥注張果注連髙脚注金陵唐淳李雲峯注儲華谷注朱晦菴亦有注晦菴曰隂符經恐是唐李佺所為是他着意做學他古文何故只因他説起便行于世向以語吕伯恭亦以為然一如麻衣易只是戴氏做自解文字亦可認龍虎經有王道注黄桐注太虛子注朱晦菴曰龍虎經乃括參同契而為之耳蓋因參同契有古記題龍虎之説遂撰此書如二用無爻位周流行六虚此言九六二用行于六畫而無定位龍虎經乃云二用無爻位張翼飛虛危怪說向别處去參同契乃東漢魏伯陽之書葛洪云伯陽作參同契假借周易爻象以論作丹之意而儒者不知神仙之事反作隂陽注之殊失其大旨然則晉以前已有人注參同契矣如虞翻注隂長生注惜皆不𫝊于世至五代偽蜀真一子彭曉作通真義以五行解三相𩔖為五相𩔖誤矣三相𩔖者大易也黄老也爐火之事也三者之陰陽造化蓋相𩔖也參即三也同即相也契即𩔖也蓋自解參同契之義也所謂委時去害與鬼隣委鬼魏字也鄭煥改鬼為仙謬矣百一之下遨逰人間百一之下為白人乃其旁之立人合之則伯字也湯遭阨際水旱隔并湯遭旱而無水易字也阨之厄際為下合之則陽字也此自解魏伯陽三字也彭真一注有蜀本有袁本有濟本有虚一子鄭煥本有汪剛刻置越州蓬萊閣下本參同契自彭真一注後有張隨注李抱素注頗簡略陳抱一注儲華谷注多有發明朱晦菴嘗托崆峒道士鄒訢之名為注鄒即朱鄒春秋邾子之國也又作考異陶𨼆居真誥所述多有仙女下降之詩識者之所不取葢隱居自為之辭耳朱晦菴曰真誥末後道授篇皆是竊佛氏四十二章經之意為之而已唐有呉真節𤣥綱論司馬子微坐忘論王昌遇易𤣥子詩韓逍遙内指通𤣥篇司馬子微序天𨼆子云要妙在乎與天地真氣㝠契同運又云覺氣來則運自己之氣適與天地之氣偕作此是至妙之術儻三百六十日内運自己之氣適合天地之氣三兩次則自覺身體清和異于常時況久久留之則神仙之道不難至矣化書乃譚峭所作峭字景升攜其書來求齊丘序齊丘殺景升遂竊其書自名之入藥鏡乃白鶴山崔帶範所作吕洞賔詩云因看崔公入藥鏡令人心地轉分明夏雲峰儲華谷蕭了真皆有注予觀其書云天應星地應潮不過謂上下徃來爾若泥其說則斗杓毎月移一辰月月不同海潮每日兩至日日相似二者安得俱應耶又謂所謂窮戊巳或謬為窮戊癸者遂以癸為天癸亦猶悟真篇見芽生須急採或以芽生為癸生是皆學三峰之術者妄亂改之以證其邪說云爾儲華谷戊癸化火之說李玉溪坤癸之論蓋欲反邪歸正而強為之辭耳五代時有鍾離寂道指𤣥三十九章吕洞賓詩施肩吾静中吟三住銘西山㑹真記鍾吕傳道集宋有陳希夷指𤣥篇八十一詩劉海蟾還金篇亦十四詩陳朝元玉芝詩楊虚純粹論劉希鶴朗然子詩甯𤣥子詩張鴻濛還元篇玉鼎悟解篇張平叔悟真篇薛道復命篇劉髙尚法語劉虚谷還丹篇陳黙崇正篇李長元混元篇諸書惟悟真復命有注張君房集道藏之書為雲笈七籖多雜以符咒行持因果報應之說曽至㳺子曽慥作道樞舉諸仙丹詩歌訣如海蟾之還金朝元之玉芝皆在焉劉向列仙傳葛洪神仙傳沈份續仙傳曽至㳺集仙傳易如剛仙𫝊拾遺陳葆光三洞神仙録他如洞仙傳神仙感遇傳其說雖雜然古今諸仙之名皆載于編丹家詩詞歌訣如元陽子大道歌曾先生靈源歌張虚静大道歌髙象先破迷歌吳真節學仙歌玉鼎破迷歌缺處證道歌劉髙尚敲爻歌金華子注洞微子詩又有托古人之名為之者如隂君還丹歌三茅君大道歌葛仙翁流珠歌許旌陽醉思仙歌吕公𤣥牝歌多有說得分曉處劉虚谷易𫝊不過借易以文其說耳非知易者也是故朱晦菴深詆之陳谷神了然論詹天錫大易内解王虚白三敎貫一論楊蓬樓三五歸一說其說雖繁儘有可觀白玉蟾有武夷集上清集玉隆集海瓊集金關玉鑰集又有留子元問道集彭鶴林問道篇皆門弟子所編羣仙珠玉集載張紫陽金丹四百字石杏林還源篇其文辭格調與玉蟾所作無異蓋玉蟾托張石之名為之耳陳泥丸翠虚篇亦是玉蟾所作其首篇數首詩皆元陽子詩其後紫庭經羅浮吟歸一論與武夷等集如出一手玉蟾謝陳泥丸書謝張紫陽書無非張皇其說然所謂青山暮雲碧潭夜月芭蕉春風之機梧桐秋雨之秘以論升降浮沈極盡形容之妙彼所以宛轉為之假托者蓋欲深取信于當時學者故爾玉蟾傳彭鶴林彭𫝊蕭了真蕭有金丹大成集發眀玉蟾之說所謂七七元來四十八此是𤣥𤣥真口訣者還源篇則曰老汞三斤白真鉛一㸃紅四百字則曰老汞三斤白真鉛一㸃黒蓋四十八即三斤汞其一即真鉛也一斤十六兩即二八也二八即金半斤水半斤也即悟真篇所謂藥物一斤須二八調停火候託隂陽也了真有一圖以重坎居子重離居午坎一變為節居丑再變為屯居寅離一變為旅居未再變為鼎居申三變為未濟居酉四變為䝉居戌是為朝屯暮蒙屯下震上坎蒙上坎下艮震動也艮止也應動静在朝在暮之說又有廖蟾輝作三乘内篇沈白蟾作金丹篇皆玉蟾之徒也許知微先天正宗修真秘訣用十二時之交處候自序云淳熙問得漢州彭夢蘧所傳其後有蕭觀復丹序寳鑑内象丹旨與知微所傳同菴塗南子不著姓氏有達源篇嘉熙己亥壽春魏顯著其書廬山素陽子陳闗有正道篇淳祐二年漢東孟珙廬陵劉元綱皆為作序永嘉周無所金丹直指寳祐甲寅蜀人楊子政跋梅時雜言文之以濂洛之說儘有妙理張用常真如至命篇慶元戊午囘陽子趙彦最刋板毘陵霍上谷丹訣有一字𤣥機參問七月無錫尤木石序其書上谷之子巨川又作金丹口訣直指極論天上有戊巳之時與人身戊巳相符蓋謂坎戊離已也在天為日月相望之辰在人身為呼吸相含育也吾鄉糜知府諱號𨼆齋官至奉直大夫有洞陽子眀真篇寳祐丁巳刋板于家雲間有蟾谷子王奎貫靈篇華谷子儲泳解隂符經參同藥鏡悟真四書又作㑹三集松江有刋板括蒼道士馮守經有正道篇不曽刋板與王頥菴俱受道於曹黙菴宜春李簡易號玉溪子有心印經解悟真指要羲皇作用等書又有規十圖付長沙彭石頗簡明並刋于湖南近者江西有翻刋本又有彭石密語并跏趺大坐調元氣歌及注解極分曉末句云記此即便付丙丁乃下手真口訣也當時彭得之不忍焚遂流落于江湖間得此書者雖不咨問可也大徳戊戌有道友自湘潭來以趙古蟾性命混沌書示予觀其注雖雜以禪語亦自明白大徳庚子夏壺𨼆示以金丹又𤣥篇云是梁九陽所作觀其自序云得之王山賓天台山賓王可道號真常子與夏雲峰陳了空郁蘆菴相倡和山賓有衆妙義集至元辛巳文如心太傅攜此書示余係是寫本永嘉夏元鼎號雲峰註隂符藥鏡悟真三書真西山為序瀘川郁蘆菴刋修真四書于羊角洞天其一韓逍遙内旨通𤣥訣其二陳了空復一篇其三王呆徹舉一篇其四丹房得一篇咸淳庚午蜀人何逢吉序維揚陳宇道號抱一子有立命篇紹定庚寅白玉蟾跋又注闗尹子參同契董矩堂丞相題跋于後三谷子丘山有金丹百問序云乾道初受道于金華老人委羽子指真篇自序云紹定庚寅年作不著姓氏其徒有澄真篇亦不著姓氏金真敎王重陽金真集馬丹陽微語集金玉集譚長真水雲集劉長生仙樂集丘長春蟠溪集鳴道集王玉陽靈光集郝廣寧太古集北方有刋本總名七真要訓燕山道路邇多刋丹書大徳己亥攜丁靈陽文集恵予又以馬丹陽語録求予序遂為序其篇端或曰霍上谷玉蟾谷儲華谷糜洞陽皆知而不為者也雖有書存乃空言耳予曰不然豈不聞列子之說乎列子云昔人有言不死之道者燕居使人受之而不捷言者死燕居甚怒其使者将加誅焉幸人諌曰人所憂者莫急於死已所重者莫過乎生彼自喪其生安能令君不死之乃不誅有齊子亦欲學其道聞言者之死乃撫膺而恨富子聞而笑之曰夫所欲學不死其人已死而猶恨之是不知所以為學胡子曰富子之言非也凡人有術不能行者有矣雖能行而無術者亦有矣衛人有善數者臨死以訣諭其子其子志其言而不能行他人問之以其父所言告之而行其術與其父無差焉若然死者豈不能言生術哉朱晦菴謂季通曰隂君丹訣見濂溪有詩及之當是此書行此而夀考者乃吃猪肉而飽者吾人所知蓋不止此乃不免于衰病豈坐談龍肉而實未得嘗之比耶愚四十年前注參同契時見吕四行八段錦術詫其老徤毎竊笑之逮今思之參同契之學實屠龍術不如四平之宰猪也知而不為乃晦菴所謂坐談龍肉者爾然學是學者非屏妻子不可為也我輩讀聖人書況有父母存詎敢違天而為偷生之計哉然於此嘗夜坐而試之矣蓋亦略知龍肉之味者也豈不愈於坐談而不知味者乎愚少也多病羸不勝衣所以茍延殘喘而至今未死亦參同契之力也予自徳祐後文塲掃地無所用心但閉户静坐以琴自娛讀易讀内外二丹書遂成四癖琴之癖欲以六律正五音問諸琴師皆無答後得紫陽琴書南溪琴統奥音玉譜始知旋宫之法乃作周南召南詩譜及鹿鳴皇華等詩絃歌之離騷九歌蘭亭詩序歸去來辭醉翁亭記赤壁賦皆有譜琴之癖遂已易之癖集諸儒之說為卷一百二十名曰大易㑹要以程朱二公為主諸說之善為輔又益以平昔所聞于師友者為周易集說四十卷易之癖遂已内丹則集漢唐以來丹詩歌訣一百卷名曰通𤣥廣見集至元癸未遇異人授以先天之極𤣥乃撰參同契發揮悟真衍義等書其癖亦已外丹則硃砒汞不知㡬成烟焰一夕猛省參同契金以沙為主併和以水銀之說世惟有金丹無銀丹也遂碎其爐竈鉗之屬此癖乃不復作嘗撰爐火監戒録今姑舉其略周世宗顯徳三年召華山𨼆士陳摶問以黄白之術對曰陛下為天子當以治天下為務安用此為乃遣還山詔州縣長吏常存問之眞宗景徳年間朝謁山陵因詔異人左右以賀蘭歸真聞乃詔對問曰知卿有㸃化術可以言之奏曰臣請言帝王㸃化術願以堯舜之道㸃化天下以致太平惟陛下用之王捷汀洲沙人賈販徃來江淮間遇異人得燒金術戒之曰非遇人君不可妄泄捷亟欲獻於上為有司所欲從時徉狂遂以此獲罪黥竄嶺外未㡬逋匿京師詣登聞院自稱樞密承㫖謝從權嘗為嶺南官知其術為奏得脱軍籍内臣劉承規以其名聞于上召見與語悅之特受許州參軍改名中正留止京師前後貢金累巨萬官至右神武大将軍唐州團練使有老煅工畢升曽在禁中為捷煅金其升曰其法為爐竈使人隔牆鼔葢不欲人覘其啟閉也其金以鐵為之百餘兩為一餅每餅輻解鑿為八片謂鴉嘴金是也上令尚方鑄為金龜金牌各數百龜以賜近臣各一枚餘悉藏玉清昭應宫牌以賜天下州府軍監各一天慶觀金寳牌即其金所鑄也毎用蛇岡製煉雄黄所殺蛇葢不少矣後因治第掘土見一巨蛇首大如栲栳驚悸得疾卒年五十五其妻施氏封吳郡夫人諸子皆授殿直捷初得神術不以勢利輒告于人及得禄賜與所化黄金惟施貧奉道釋而已朝廷舉大禮又營繕皆以黄金為獻以助經費國史王中正傳太史曾鞏所撰也名臣碑傳琬琰集云咸平年間捷至南康軍遇異人自言姓趙久之又見于茅山命求鉛汞敎以作金法廣陵志云捷于維揚遇道士相攜至五通廟指示靈草𫝊以合和密訣大中祥符間嘗撰文報謝廟中舊有祝文石刻兵火不存至今尚有燒金草存焉張文定公詠字復之號乖崖在蜀有術士上謁言能煅汞為白金公即市百兩俾煅一火而成不耗銖兩公立命工煅為大香爐鑿其腹曰充大慈寺殿上公用爐送寺中以酒榼遺術者而謝絶之范文正公仲淹字希文與南郡朱某相善朱且病公視之謂公曰某遇異人得變水銀為白金術吾子幼不足傳今以傳君遂以其方并藥贈之公不納強之乃受未嘗啟封後其子寀長公教之義均子弟及寀登第乃以所封藥并其術還之胡文恭公肅字武平少善一浮屠其人将死謂公曰我有祕術能化瓦石為黄金子其葬我公曰爾之後事吾敢不勉祕術非所欲也浮屠嘆曰子之志未可量也樞密院編修居世英之父居四郎者少遇異人得伏火丹沙法以金汞等分結成砂子裹以伏火丹砂煅之成紫磨金未嘗對人言亦嘗輒用一錢臨終呼世英語之曰我煅法世惟語韓魏公矣非韓魏公徳業之厚於人不可授也我亦不當授汝汝分中合得自當有授汝者然素知我有此法必有妄求之費因語數法不可成寳者又語因觀數人豫此致禍者戒之戒之有一僕守火嵗乆不懈因度為僧居京師定歴院時曽子宣當軸有堂吏病瘵國醫不能療居視之曰應須我神丹乃取刀圭與服而愈子宣大驚吏白之幸獲居四郎之丹奪命鬼手子宣使人邀居不能至也使門下之人宛轉啖其僧資給甚偹僧一日謁丞相許分竊為獻子宣喜甚送僧降階僧退揖為馬臺蹶倒應時折足輿歸數日遂卒尹和靖先生焞字彦明語門人祈寛云伊川因逺行晚憩一古寺設臥具於佛座前未寢聞若䑕聲熟視之果有䑕在佛腹小竅中銜一文字欲出復入伊川起視之則見佛腹竅中有文字一卷取而讀之乃丹方而其首曰不換世間術伊川過目悉能了其意遂錄一本仍以元紙納竅中後因郊居嘗煅此丹其法火養四十九日乃成煅近三十日遇夜則四野來問之宅中不遺火某等皆見火發如此數四恐驚衆遂取出焚試以粟粒置銀盂中凡丹到䖏皆成黄金崇寧間盂尚在其金如線圈轉數匝皆丹著處也其丹半成者封裹于衣箱中以其近怪故終不以告人某嘗乗間問伊川伊川曰此外丹也若人内丹成服之可以長年㸃化五金不足道也某曰胡不服之伊川曰這箇肚皮裏便着此物晚年許𫝊此方與一道士未傳而伊川卒後月餘道士至則無及矣蘇子由龍川略志云吾兄子瞻嘗從事扶風開元寺多古畫而子瞻好畫徃徃疋馬入寺循壁終日有老僧出揖之曰小院近在此能一相訪否子瞻欣然從之僧曰貧道好藥術有一方能以硃砂化淡金為精金老當傳人而患無可傳者知公可傳故欲一見子瞻曰吾不好此術雖得之将不能為僧曰此方知而不可為公若不為正當傳爾是時陳希亮少卿守扶風平生溺于黄白嘗于此僧求方而僧不與子瞻曰陳卿求而不與吾不求而得何也僧曰貧道非不恱陳卿以其得方不能不為耳貧道昔嘗以方授人矣有為之即死者有遭喪者有失官者故不敢輕以授人即出一卷書曰此中多名方其一即化金方公必不肯輕作但勿輕以授人如陳卿慎勿傳也子瞻許諾歸視其方毎淡金一兩視其分數不足一分試以丹砂一錢益之雜諸藥入乾鍋中煅之鎔即傾出金砂俱不耗但其色淺深斑斑相雜當再烹之色匀乃止後偶見陳卿語及此僧遽應之曰近得其方陳卿驚曰君何由得之子瞻具道僧不欲輕傳之意不以方示之陳固請不已不得已而與之陳視之良驗子瞻悔曰某不惜此方惜負此僧耳公慎為之陳姑應之曰諾未㡬坐受鄰郡公使酒以贜敗去子瞻疑其以金故陳自悔恨後謫居黄州陳卿子慥在黄子瞻問曰少卿昔嘗為此法否慥曰吾父既失官至洛陽無以買宅遂大作此然竟病指癰而没乃知僧言不妄也後十餘年謫居筠州有蜀僧議介者師事克文禪師文之所至輒與修造所費不貲而不知錢所來又秘其術不以告人介與省聰禪師善密與聰道其方大𩔖扶風開元僧所傳然介未嘗以一錢自利故能保其術而無恙又云予治平末泝陜還蜀泊舟仙都山下有道士持陰真君丹訣石本示余余因問以燒丹事對曰内丹未成内無以主之則服外丹者多死譬積枯草敝絮而置火于其下無不焚者後十餘嵗官于南京張公安道家有道人為養金丹其法用紫金丹砂期年乃成公告余曰藥成可服也余謂公何以知藥成也公曰抱朴子曰藥成以手握之如泥出指間者藥真成也今吾藥如此以是知其成矣予為公道仙都所聞謂公曰吾自知内丹成則此藥可服若猶未也姑俟之若何公笑曰我姑俟之耶東坡先生年二十有六初仕岐下有異僧強授之以化金方既得其術自是緘封之後以授潁濱先生潁濱亦藏之逮居武昌有親故知之因扣其術潁濱曰自先兄見授秘之有年矣暇日當求之巾笥間久之呼求者至出書示之東坡岐下緘之宛然潁濱乃啟封披其書曰此其是乎求者欣然曰是矣潁濱即焚于爐中語求者曰貧可忍也此寧可為乎求者愧赧若無所容倉皇狼狽而去姑蘇查先生得煅硝石法章申公與之為莫逆交而法不傳嘗遇一病僧而憫之取硝作盂令日煎水飲之服之月餘病良已有周旋過而問其由以飲煎水為言是僧素知查術曰此伏硝所成當取汞置盂中就火試之果至汞死僧更以為希世之遇即徃禮謝再三且語其盂之異復懇求其法查曰法固未易傳而前盂用力將竭可攜來為公加藥為之僧取盂授查則碎盂别鎔門臨大河俟硝成汁即鉗投水中曰我初但欲起師之疾不意無厭至此也僧乃懊恨而歸方子明道人寓瑞州夀聖寺蘇欒城贈以詩云水銀成銀利十倍丹砂為金世無對此人靳術不肯𫝊闔户泥爐畏天戒子由嘗為黄白術先治一室甚密中置火爐将舉火見一大猫據爐而溺須㬰不見子由謂神仙之術天使濟貧乏待其人然後傳予非其人遂不敢講張義方合還丹數年未就遇疾将卒恨不成九轉之功命子弟發丹竈竈下有巨虺火吻錦鱗蜿蜒其間若為神物護持乃取丹餅餌一粒瘖瘂而卒東坡詩云暮年眼力嗟尤在多病顚毛切未華故作明牕書小字更開幽室養丹砂黄魯直注云按先生與王定國書云近有恵丹砂少許光彩甚竒固不敢服然其教以養火觀其變化聊以悦神度日又詩云曹南劉夫子名與子政齊家有鴻寳書不鑄全褭蹄促席問道安遂䝉分刀圭不忍獨不死尺書肯見梯趙次翁注云劉夫子豈劉宜翁乎先生在恵州有書與宜翁云或有外丹已成可助梨棗者望不惜分恵其書具在毘陵後集趙堯卿注云劉安世待制字器之曹南人得養生煉丹術公嘗師之夀州八公山側土中及溪澗門往徃得小金餅世傳淮南王藥金有印子文謂印子金也㐮陽之間舂陵白水地發土多得金麟趾褭蹄金如乾柿謂之柿子金小說謂麟趾褭蹄乃婁敬所為藥金也方家謂婁金和藥最良漢書注亦云異于他金東坡有物𩔖相感志草部有煮碙煮雌等草爇客多用之然不得其煮煉之法耳予嘗閱華嚴經第七十八卷有藥汁名訶宅迦人或得之以其一兩變十兩銅畨成真金有一僧舉此致語予語之曰問作華嚴經者則知之僧笑而去予嘗以胆礬少許擦刀頭皆金也意者訶宅迦其胆礬之謂乎至大辛亥鑄錢時予在饒州曽見一胆水化鐵成銅但饒州之胆銅坑所出故成銅蒲州之胆出金坑必能化銅鐵成金華嚴所謂訶宅迦今人不識之耳佛語必不妄也瓦石砂土皆可變金乎春渚記聞夢溪筆談述異志涉世録皆有瓦石沙土金生薑非變金之物投轄録有生薑金蕨菜非變金之物清異志有蕨葉金不特此也尚書故實有竹葉金暌車志有江茶金甚而江淮異人録有握雪金宣室志有溺金述異志有唾銀果皆有之乎曰幻也何謂幻詭怪妄誕也秘閣閒談有所謂鐵釘銀神仙感遇傳有所謂生鐵銀茅亭客談有所謂銅錢銀崑山集𩔖有所謂鉛銀邵康節詩云鉛錫㸃金終屬假愚謂鉛錫與銅鐵五金之同𩔖固雖是假然其變化理或然也若瓦石沙土則恐不能至于薑蕨竹葉江茶不能變化則無是理矣夫薑蕨之𩔖尚有質雪與唾溺是何物也可謂妄誕之甚矣清源莊念祖方外志云西蜀估人孫生者販水銀于長安担夫足跌于棧閣偶觸山石破其銚遽挽路傍草塞之晚抵客舎視之則銚中水銀皆凝結矣孫生知其為靈草所制規欲多取之促其僕夫飯鞭驢由舊路而去暮登閣道驢驚失足墜于嘉陵江中韓清老農何逺春渚記聞臨安僧法堅言歙客經于潛山中見一蛇腹脹蜿蜒草中徐遇一草便囓破以腹就磨頃之脹消而去客念此草必消腫毒之藥就取置篋夜宿旅邸鄰房有呻吟者客訊之云正為腹脹所若即取草煎湯飲之少頃不復聞聲至曉但聞滴水響呼不應即起視之則其人血肉俱化為水急挈裘而逃客邸主人及明潔釡将炊飯則釡通體成金矣乃密瘞其骸既乆經赦客方至旅舎乃與主人共語其事郭雲翼江湖紀聞嘉泰年間吉州禾山寺僧見一蛇擊傷惟頭尾略有動復見一蛇旋繞數匝而去未㡬復見去蛇銜野草覆其傷處不踰時二蛇引領同去既而寺有行童登樹折足僧取此草覆之并煎湯洗濯令寢静室旦視唯有枯骨存肉則剥爛無餘煎草之釡則金釡也僧知此草可以化鐵成金遂秘其說里人昭州守張某聞之厚禮遺僧欲知此草僧不言昭州遂令行童父母訟于官繫僧于獄令人語僧曰若不言此草終無出期僧終不肯言遂死于獄昭州雖慘刻僧亦愚甚耳張華博物志云劉徳治淮南王獄得枕中鴻寳苑秘書及子向咸共竒之信黄白之術可成卒無驗乃以此罹罪太平廣記云隋末有道者居太白山煉丹砂合大還丹而成弼者給侍左右十餘嵗後以家艱辭去道者云子從我乆今復有憂吾無以贈子遺子丹十粒一粒化一斤銅成金足以辦喪事弼還如言化金辦𦵏訖復入山更求丹道者不與弼持刀刼之不得乃㫁道者手又不得乃刖其足道者顔色不變弼滋怒乃㫁其頭及解右肘後有赤嚢開之乃丹也弼得丹多變黄金為人所告有姦弼自别能成黄金唐太宗聞之召令造金太宗悅授以五品官造金數萬斤而丹盡藝窮請去太宗令列其方當任去弼訴之帝謂其詐挾之以兵弼不列遂為武士㫁其手又不言刖其足弼述其本末亦不信遂斬之江夏黄休復茅亭客話云偽蜀成都有栁條酒肆其時皆以當爐者名其肆栁條病經嵗有道士常來貰酒栁條毎加勤奉道士乃留丹數粒云以酬酒價栁條依教服之充盛如初有漢金堂縣王道賓為太廟吏知其事遂懇栁條求餘藥以鐵鐺盛水銀投丹煎之須臾成金因以丹與金呈蜀王問其一作真法對曰有草生三學山中乞宰金堂以便採藥乃授金堂宰明年藥無成知其得丹于栁條遂誅之劉長官名蟾結茅青城山中或云其有黄白法一夕有三人攜酒果投宿語及爐火語笑方酣客曰知長者有黃白法可以梗概言之長官初則堅拒客祈之不已作色曰今夜須傳長官曰適募君子同道乃相逼如此三人攘臂瞋目眄之曰某等非君子是賊也如不得法必加害于君乃探出白刃脅之長官與妻惶懼遂授以法并與殘藥三人拱揖而去長官昧爽下山不復再徃因以居與李諶處士法空無相師霅川沈待制之季也嘗于焦山僧法全語及㸃化全云我有一術㸃銅為金乃于袋中抄數錢七令空烹之通夕不成汁空呌全訊之全笑曰人得此視之溪砂也豈知實銅也耶復取白藥少許投之砂始融化出火視之真金也空一作因日加延欵具請其術全曰我不惜術但我有前恐起貪人妄費之心反致竒禍實無益于人也請言其自我年二十無家與道人同侣三人共學丹竈紹聖元年七月十五日相語曰我輩所學逰方未逺今當散行以十年為期却以此日㑹于此地道人無累是日不至即道死矣遂舉酒為約三人者散往川峽京洛間我即留二浙至出期豐樂橋三人次第俱集各出所得方訣參較之内一茅法差簡易試為之而銅色不盡一人曰我於成都藥市遇一異人得去暈藥彼云奇甚而我未試也因取同煎而色益黄意謂藥未至則當一作増再煎及出則真金也相與謀曰京師蠻家金肆天下第一徃市之無疑則真仙術也至都以十兩就市即得高直時共寓相國寺東客邸中共作百兩金以為别即市羊邊宫醖大嚼酣飲而烹銅不意銅汁濺發火延于屋三人俱醉一人醉甚不支焚死一人就捕受杖亦數日而死我獨㣲醒徑破烟焰脫命而出懼有捕者素善泅即投汴水順流而下度過國門始登岸方在水中悔過祈天為僧乃不復再作或遇大縁事不能成就當啟天為之不敢毫髮已用況敢傳人乎空聆其說遂不敢逼一旦不告而去不知所在焉韓子蒼待制言青城一道士俾小厮買酒待檀越小厮中道登東所將鐵瓶掛于樹間瓶重木弱為風所揺木葉楷磨所著處皆金色自是識化金之木走四方未始乏絶寓滑州天慶觀以老病不出㡬十年欲傳其術與人而未有可付者隂視觀前一老人賣米為業不問荒歉每年求息一文以其為行有常或可以傳一日招至酒肆密告以欲傳之意老人曰某能是乆矣道士曰明日過我共試之詰旦老者至因扄户而共煅藥隣房道士侣有所聞乃穴壁視之見二人各以火煅藥傾注于地則赤金爛然遞相把玩稱嘆乃推壁而入二人倉皇收拾不及因喧呶爭奪卒壓死二人而衆士因是而皆坐獄何薳云丹竈之事士大夫與山林學道之人喜于談訪者十蓋七八然不知皆仙藥丹頭也自三茅君以丹陽嵗歉死者盈道因取丹頭㸃銀為金化鐵為銀以救饑人故後人以煅粉㸃銅者名其法曰丹陽死砒㸃銅者名其法曰㸃茅如漢之王陽婁敬唐之成弼近世王捷不可謂世無其法但得之者龜毛角而為之致禍者十居八九如東坡先生楊元素内相皆密受其訣知而不為者也章申公黄八座道夫皆訪求畢世費貫鉅萬而了無一遇者也夏侯嘉正為館職平生好燒銀常曰吾得見水銀銀一錢知制誥一日無限矣俱不諧而卒紹興間淮堧有一道人求乞手持一鐵牛髙呼鐵牛道人在浮光數月忽一日入富家典庫乞錢主人問鐵牛究意對曰能糞𤓰子金主人欲以資財易之道人堅不肯後議止賃一宿令置密室來早開視果糞𤓰子金數星道人至取鐵牛去主人妄想心熾尋訪道人欲買此牛道人不從百色宛轉方允議以日得金計之償以一嵗金價在家數日糞金如前金自後更不糞視牛尾後有一竅無他異忽家中一婢暴疾召其夫贖去迹其所之乃道人預買此婦人密持其金在其家前後糞金皆此婦人潛置之候計成而取去尋之已逃矣出趙灌園就日録破布衣裳破布裙逢人更說㑹燒銀君還果有燒銀術何不燒銀自養身徐卿涉世録載此語戒其季子云世之癡者為爇客所誤汝等切宜戒之席上腐談卷下
